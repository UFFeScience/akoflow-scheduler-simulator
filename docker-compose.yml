services:
  backend:
    build:
      context: ./backend
      target: debug
    ports:
      - "8000:8000"
      - "2345:2345"
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
